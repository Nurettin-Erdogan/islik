<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">İşlik işletme asistanı önizlemesi</title>
  <desc id="desc">İş özeti, yaklaşan işler, müşteri ve finans kartlarını gösteren stilize bir işletme paneli.</desc>
