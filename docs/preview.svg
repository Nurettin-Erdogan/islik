    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#020617" flood-opacity=".36"/></filter>
  </defs>
  <rect width="1200" height="650" rx="42" fill="url(#background)"/>
  <circle cx="1060" cy="120" r="190" fill="#bef264" opacity=".1"/><circle cx="120" cy="580" r="200" fill="#34d399" opacity=".1"/>
