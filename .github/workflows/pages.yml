name: Deploy Islik to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify static files
        shell: bash
        run: |
          node --check app.js
          node --check sw.js
          node -e "JSON.parse(require('fs').readFileSync('manifest.json', 'utf8'))"
          test -f index.html
          test -f styles.css
          test -f assets/logo.svg

  smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Run browser smoke test
        run: npm test

  deploy:
    if: github.event_name != 'pull_request'
    needs: [verify, smoke]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare static site
        shell: bash
        run: |
          mkdir _site
          cp index.html app.js styles.css manifest.json sw.js _site/
          cp -R assets _site/assets

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
